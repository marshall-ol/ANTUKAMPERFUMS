<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANTUKAM PARFUMS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }

    html, body {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      color: #fff;
      overflow-x: hidden;
      background: #050505;
      position: relative;
      cursor: none;
    }

    @media (pointer: coarse) {
      body {
        cursor: auto;
      }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -4;
      background:
        linear-gradient(180deg, rgba(5, 5, 5, 0.18) 0%, rgba(0, 0, 0, 0.92) 100%),
        url("imagenes/fondo-lujo-horizontal.jpg") center center / cover no-repeat;
      filter: saturate(0.98) contrast(1.12) brightness(0.50);
      transform: scale(1.06);
      animation: backgroundZoom 18s ease-in-out infinite alternate;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 232, 180, 0.20), transparent 24%),
        radial-gradient(circle at 15% 76%, rgba(255, 255, 255, 0.05), transparent 18%),
        radial-gradient(circle at 82% 58%, rgba(216, 192, 138, 0.09), transparent 22%),
        radial-gradient(circle at 60% 80%, rgba(140, 110, 40, 0.08), transparent 18%);
      filter: blur(14px);
      animation: lightSweep 9s ease-in-out infinite alternate;
      opacity: 0.95;
    }

    @keyframes backgroundZoom {
      from { transform: scale(1.04) translate3d(0, 0, 0); }
      to { transform: scale(1.12) translate3d(-1.2%, -0.8%, 0); }
    }

    @keyframes lightSweep {
      from { transform: translate3d(-1.5%, -1%, 0) scale(1); opacity: 0.78; }
      to { transform: translate3d(1.5%, 1.2%, 0) scale(1.05); opacity: 1; }
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      width: 100%;
      height: 100%;
      opacity: 0.95;
    }

    .cursor-glow,
    .cursor-dot {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.25s ease;
    }

    .cursor-glow {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 223, 160, 0.22) 0%, rgba(255, 223, 160, 0.08) 35%, transparent 72%);
      filter: blur(6px);
    }

    .cursor-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 240, 205, 0.95);
      box-shadow: 0 0 18px rgba(216, 192, 138, 0.55);
    }

    @media (pointer: fine) {
      body:hover .cursor-glow,
      body:hover .cursor-dot {
        opacity: 1;
      }
    }

    .screen {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      opacity: 1;
      transform: scale(1);
      transition: opacity 0.65s ease, transform 0.65s ease, filter 0.65s ease;
    }

    .screen.hidden {
      display: none;
    }

    .screen.fade-in {
      animation: screenEnter 0.75s ease forwards;
    }

    .screen.fade-out {
      animation: screenExit 0.45s ease forwards;
    }

    @keyframes screenEnter {
      from {
        opacity: 0;
        transform: scale(1.02) translateY(18px);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    @keyframes screenExit {
      from {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: scale(0.99) translateY(-10px);
        filter: blur(8px);
      }
    }

    .intro {
      text-align: center;
      padding: 30px;
      background:
        radial-gradient(circle at center, rgba(190, 150, 60, 0.14), transparent 40%),
        linear-gradient(180deg, rgba(9, 9, 9, 0.22) 0%, rgba(2, 2, 2, 0.42) 100%);
      backdrop-filter: blur(2px);
    }

    .intro small {
      letter-spacing: 4px;
      color: #b89b5f;
      font-size: 12px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(184, 155, 95, 0.18);
    }

    .brand {
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 12px;
      font-weight: 400;
      margin-top: 20px;
      color: #f7f1e8;
      text-shadow:
        0 0 6px rgba(255, 245, 220, 0.12),
        0 0 18px rgba(216, 192, 138, 0.18),
        0 0 36px rgba(216, 192, 138, 0.12);
      animation: titleFloat 6s ease-in-out infinite alternate;
    }

    .brand-sub {
      margin-top: 10px;
      font-size: clamp(1.5rem, 4vw, 3rem);
      letter-spacing: 14px;
      font-style: italic;
      color: #c9c1b2;
      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.08),
        0 0 18px rgba(184, 155, 95, 0.16);
      animation: titleFloat 6s ease-in-out infinite alternate-reverse;
    }

    .tagline {
      margin-top: 20px;
      color: #9a9a9a;
      font-style: italic;
      font-size: 16px;
      text-shadow: 0 0 10px rgba(255,255,255,0.05);
    }

    .discover-btn {
      margin-top: 35px;
      padding: 14px 34px;
      border: 1px solid #b89b5f;
      border-radius: 999px;
      background: rgba(184, 155, 95, 0.08);
      color: #f3e6c8;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.35s ease;
      box-shadow: 0 0 20px rgba(184, 155, 95, 0.18);
      position: relative;
      overflow: hidden;
    }

    .discover-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.18) 50%, transparent 100%);
      transform: translateX(-120%);
      transition: transform 0.7s ease;
    }

    .discover-btn:hover::before {
      transform: translateX(120%);
    }

    .discover-btn:hover {
      background: rgba(184, 155, 95, 0.18);
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 0 30px rgba(184, 155, 95, 0.28);
    }

    .catalog {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at center top, rgba(205, 170, 90, 0.14), transparent 26%),
        radial-gradient(circle at left bottom, rgba(30, 60, 120, 0.14), transparent 22%),
        radial-gradient(circle at right bottom, rgba(255, 208, 110, 0.08), transparent 20%),
        linear-gradient(180deg, rgba(10, 10, 10, 0.20) 0%, rgba(2, 2, 2, 0.84) 100%);
      backdrop-filter: blur(1px);
    }

    .topbar {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      pointer-events: auto;
    }

    .back-btn {
      position: relative;
      z-index: 1001;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.25s ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
    }

    .topbar h2 {
      font-size: 14px;
      letter-spacing: 4px;
      color: #e0c98f;
      text-transform: uppercase;
      opacity: 0.95;
      text-shadow: 0 0 12px rgba(216, 192, 138, 0.22);
    }

    .catalog-layout {
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 188px minmax(0, 1fr);
      align-items: stretch;
    }

    .menu-dock {
      position: relative;
      min-height: 100vh;
      overflow: visible;
      z-index: 30;
    }

    .catalog-main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 96px 28px 48px;
      position: relative;
    }

    .hero-inner {
      width: min(1120px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      position: relative;
      z-index: 2;
    }

    .big-title {
      position: absolute;
      top: 1%;
      left: 0;
      right: 0;
      width: 100%;
      text-align: center;
      font-size: clamp(3rem, 10vw, 7rem);
      letter-spacing: 10px;
      font-weight: 700;
      pointer-events: none;
      z-index: 1;
      white-space: nowrap;
      background: linear-gradient(180deg, #fff3c9 0%, #efd27a 34%, #c88f28 60%, #fff0b8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 10px rgba(255, 231, 170, 0.18)) drop-shadow(0 0 24px rgba(184, 155, 95, 0.24));
      text-shadow:
        0 0 8px rgba(255, 231, 170, 0.12),
        0 0 24px rgba(216, 192, 138, 0.18),
        0 0 40px rgba(216, 192, 138, 0.08);
      animation: titleGlow 4s ease-in-out infinite alternate, titleFloat 5.5s ease-in-out infinite alternate;
      transform: none;
    }

    .carousel {
      width: min(1080px, 100%);
      display: grid;
      grid-template-columns: 68px 1fr 68px;
      align-items: center;
      gap: 8px;
      z-index: 3;
      position: relative;
      margin-top: 18px;
    }

    .arrow {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #fff;
      cursor: pointer;
      font-size: 28px;
      display: grid;
      place-items: center;
      margin: 0 auto;
      transition: 0.28s ease;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 18px rgba(0,0,0,0.18);
      position: relative;
      z-index: 6;
    }

    .arrow:hover {
      transform: scale(1.08);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 24px rgba(255,255,255,0.12);
    }

    .showcase {
      position: relative;
      width: 100%;
      min-height: 430px;
      display: grid;
      place-items: center;
      perspective: 1400px;
      transform-style: preserve-3d;
      overflow: visible;
    }

    .bottle-stage {
      position: relative;
      width: min(560px, 94vw);
      height: 490px;
      display: grid;
      place-items: center;
      perspective: 1400px;
      transform-style: preserve-3d;
      overflow: visible;
      animation: stageFloat 6s ease-in-out infinite alternate;
    }

    .bottle {
      width: 270px;
      max-width: 62vw;
      height: auto;
      filter:
        drop-shadow(0 24px 18px rgba(0,0,0,0.34))
        drop-shadow(0 38px 40px rgba(0,0,0,0.62));
      position: relative;
      z-index: 3;
      transform-origin: center center;
      will-change: transform, opacity;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      animation: bottleFloat 4.2s ease-in-out infinite alternate;
      transition: transform 0.5s ease, filter 0.5s ease, opacity 0.5s ease;
      display: block;
      margin: 0 auto;
    }

    .bottle:hover {
      transform: scale(1.05) translateY(-6px) rotateZ(-1deg);
      filter:
        drop-shadow(0 30px 25px rgba(0,0,0,0.4))
        drop-shadow(0 45px 55px rgba(0,0,0,0.68))
        drop-shadow(0 0 18px rgba(216, 192, 138, 0.22));
    }

    .side-bottles {
      position: absolute;
      width: 100%;
      max-width: 980px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      top: 50%;
      transform: translateY(-10%);
      z-index: 2;
      pointer-events: none;
    }

    .side-bottles img {
      width: 108px;
      opacity: 0.30;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.55));
      transition: transform 0.5s ease, opacity 0.5s ease, filter 0.5s ease;
      will-change: transform, opacity;
      animation: sideFloat 4.8s ease-in-out infinite alternate;
    }

    .side-bottles img.side-pop-left {
      animation: sidePopLeft 0.65s cubic-bezier(.2,.8,.2,1), sideFloat 4.8s ease-in-out 0.65s infinite alternate;
    }

    .side-bottles img.side-pop-right {
      animation: sidePopRight 0.65s cubic-bezier(.2,.8,.2,1), sideFloat 4.8s ease-in-out 0.65s infinite alternate;
    }

    .info {
      width: min(560px, 100%);
      text-align: center;
      z-index: 5;
      margin-top: -24px;
      position: relative;
    }

    .info h3 {
      font-size: 28px;
      letter-spacing: 3px;
      margin-bottom: 8px;
      color: #f7f1e5;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(255,255,255,0.08),
        0 0 20px rgba(216,192,138,0.12);
      animation: titleFloat 5.5s ease-in-out infinite alternate;
    }

    .buy-btn {
      padding: 12px 26px;
      border-radius: 999px;
      border: 1px solid rgba(184,155,95,0.7);
      background: rgba(184,155,95,0.09);
      color: #f4e7c9;
      cursor: pointer;
      letter-spacing: 1px;
      transition: 0.28s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 18px rgba(184,155,95,0.12);
    }

    .buy-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.16) 50%, transparent 100%);
      transform: translateX(-120%);
      transition: transform 0.75s ease;
    }

    .buy-btn:hover::before {
      transform: translateX(120%);
    }

    .buy-btn:hover {
      background: rgba(184,155,95,0.18);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 0 26px rgba(184,155,95,0.25);
    }

    .dots {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 100%;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      transition: 0.25s ease;
    }

    .dot.active {
      background: #d8c08a;
      box-shadow: 0 0 12px rgba(216,192,138,0.7);
      transform: scale(1.2);
    }

    .side-menu-shell {
      position: sticky;
      top: 58%;
      transform: translateY(-50%);
      margin-top: 0;
      width: 188px;
      height: fit-content;
      z-index: 30;
      display: flex;
      align-items: stretch;
      transition: transform 0.48s cubic-bezier(.18,.9,.18,1);
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.35));
      will-change: transform;
    }

    .side-menu-shell.closed {
      transform: translate(-134px, -50%);
    }

    .side-menu-panel {
      width: 146px;
      max-height: 72vh;
      overflow-y: auto;
      padding: 12px 12px 14px;
      border-radius: 0 18px 18px 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      border-left: none;
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.32);
      transform: translateX(0);
      opacity: 1;
      transition: transform 0.48s cubic-bezier(.18,.9,.18,1), opacity 0.48s ease;
      pointer-events: auto;
    }

    .side-menu-shell.closed .side-menu-panel {
      opacity: 0.12;
    }

    .side-menu-tab {
      width: 42px;
      border: 1px solid rgba(216,192,138,0.34);
      border-left: none;
      border-radius: 0 14px 14px 0;
      background: linear-gradient(180deg, rgba(216,192,138,0.16), rgba(184,155,95,0.08));
      color: #fff4d4;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
      backdrop-filter: blur(12px);
      transition: 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 0;
      position: relative;
      overflow: hidden;
      align-self: center;
      min-height: 104px;
    }

    .side-menu-tab:hover {
      background: linear-gradient(180deg, rgba(216,192,138,0.22), rgba(184,155,95,0.12));
      transform: translateX(2px);
    }

    .tab-icon {
      font-size: 16px;
      line-height: 1;
      text-shadow: 0 0 12px rgba(255, 233, 170, 0.35);
      animation: iconPulse 2.8s ease-in-out infinite alternate;
    }

    .tab-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 2px;
      font-size: 11px;
      font-weight: 700;
    }

    @keyframes iconPulse {
      from { transform: scale(1); opacity: 0.85; }
      to { transform: scale(1.12); opacity: 1; }
    }

    .side-menu-panel h4 {
      font-size: 12px;
      letter-spacing: 2px;
      color: #e0c98f;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 10px;
      text-shadow: 0 0 12px rgba(216,192,138,0.18);
    }

    .category-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      justify-content: center;
    }

    .category-chip {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #f1e5bc;
      border-radius: 999px;
      padding: 6px 9px;
      cursor: pointer;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .category-chip:hover {
      transform: translateY(-1px);
      background: rgba(184,155,95,0.12);
    }

    .category-chip.active {
      background: rgba(216,192,138,0.18);
      border-color: rgba(216,192,138,0.65);
      box-shadow: 0 0 16px rgba(216,192,138,0.16);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .menu-btn {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: #f4e7c9;
      cursor: pointer;
      font-size: 12px;
      transition: 0.22s ease;
      box-shadow: 0 0 12px rgba(0,0,0,0.12);
    }

    .menu-btn:hover {
      transform: translateY(-2px) scale(1.04);
      background: rgba(184,155,95,0.14);
      box-shadow: 0 0 18px rgba(184,155,95,0.18);
    }

    .menu-btn.active {
      background: rgba(216,192,138,0.18);
      border-color: rgba(216,192,138,0.65);
      box-shadow: 0 0 18px rgba(216,192,138,0.24);
    }

    .detail {
      min-height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at center top, rgba(205, 170, 90, 0.12), transparent 26%),
        linear-gradient(180deg, rgba(10, 10, 10, 0.22) 0%, rgba(2, 2, 2, 0.76) 100%);
      padding: 100px 18px 50px;
      overflow: hidden;
    }

    .detail::before {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 220, 155, 0.16), transparent 65%);
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      filter: blur(30px);
      pointer-events: none;
      animation: glowMove 4s ease-in-out infinite alternate;
    }

    .detail-card {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding: 28px;
      box-shadow:
        0 20px 50px rgba(0,0,0,0.35),
        0 0 30px rgba(216,192,138,0.08);
      backdrop-filter: blur(14px);
      position: relative;
      z-index: 2;
      opacity: 0;
      transform: translateY(40px) scale(0.96);
    }

    .detail.show .detail-card {
      animation: cardEnter 0.85s cubic-bezier(.2,.8,.2,1) forwards;
    }

    @keyframes cardEnter {
      0% {
        opacity: 0;
        transform: translateY(60px) scale(0.92);
        filter: blur(8px);
      }
      55% {
        opacity: 1;
        transform: translateY(-6px) scale(1.02);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .detail-image {
      width: 100%;
      display: grid;
      place-items: center;
    }

    .detail-image img {
      width: min(360px, 84%);
      max-width: 100%;
      filter: drop-shadow(0 30px 35px rgba(0,0,0,0.65));
      transition: 0.3s ease;
      animation: bottleFloat 4.2s ease-in-out infinite alternate;
    }

    .detail-text h3 {
      font-size: 34px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
      color: #f7f1e5;
      text-shadow:
        0 0 8px rgba(255,255,255,0.08),
        0 0 20px rgba(216,192,138,0.12);
    }

    .detail-text .brief {
      color: #d0d0d0;
      line-height: 1.7;
      margin-bottom: 22px;
      font-size: 16px;
      white-space: pre-line;
    }

    .detail-text .mlbox {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(216,192,138,0.14);
      color: #f5f1e8;

    let indice = 0;
    let bloqueado = false;
    let timerEntrada = null;
    let menuAbierto = true;
    let filtroActual = "all";

    const intro = document.getElementById("intro");
    const catalogo = document.getElementById("catalogo");
    const detalle = document.getElementById("detalle");

    const botella = document.getElementById("botella");
    const sideLeft = document.getElementById("sideLeft");
    const sideRight = document.getElementById("sideRight");

    const nombrePerfume = document.getElementById("nombrePerfume");
    const dots = document.getElementById("dots");

    const detalleImagen = document.getElementById("detalleImagen");
    const detalleNombre = document.getElementById("detalleNombre");
    const detalleDescripcion = document.getElementById("detalleDescripcion");
    const precio5ml = document.getElementById("precio5ml");
    const precio3ml = document.getElementById("precio3ml");

    const cursorGlow = document.getElementById("cursorGlow");
    const cursorDot = document.getElementById("cursorDot");
    const cinematicFlash = document.getElementById("cinematicFlash");

    const menuNumeros = document.getElementById("menuNumeros");
    const sideMenuShell = document.getElementById("sideMenuShell");
    const menuTab = document.getElementById("menuTab");
    const categoryRow = document.getElementById("categoryRow");

    const btnDescubrir = document.getElementById("btnDescubrir");
    const btnVolverInicio = document.getElementById("btnVolverInicio");
    const btnAnterior = document.getElementById("btnAnterior");
    const btnSiguiente = document.getElementById("btnSiguiente");
    const btnExplorar = document.getElementById("btnExplorar");
    const btnRegresarCatalogo = document.getElementById("btnRegresarCatalogo");

    function mostrarSeccion(seccionMostrar, seccionOcultar) {
      seccionOcultar.classList.remove("fade-in");
      seccionOcultar.classList.add("fade-out");

      setTimeout(() => {
        seccionOcultar.classList.add("hidden");
        seccionOcultar.classList.remove("fade-out");

        seccionMostrar.classList.remove("hidden");
        seccionMostrar.classList.add("fade-in");

        setTimeout(() => {
          seccionMostrar.classList.remove("fade-in");
        }, 800);
      }, 350);
    }

    function irAlCatalogo() {
      detalle.classList.add("hidden");
      mostrarSeccion(catalogo, intro);
      if (!menuAbierto) toggleMenu();
      mostrarPerfume(indice, 1);
    }

    function volverAlInicio() {
      detalle.classList.add("hidden");
      mostrarSeccion(intro, catalogo);
    }

    function volverAlCatalogo() {
      detalle.classList.remove("show");
      mostrarSeccion(catalogo, detalle);
    }

    function toggleMenu() {
      menuAbierto = !menuAbierto;
      sideMenuShell.classList.toggle("closed", !menuAbierto);
    }

    function getFilteredIndices() {
      if (filtroActual === "1-10") return perfumes.map((_, i) => i).filter(i => i >= 0 && i <= 9);
      if (filtroActual === "11-20") return perfumes.map((_, i) => i).filter(i => i >= 10 && i <= 19);
      if (filtroActual === "21-30") return perfumes.map((_, i) => i).filter(i => i >= 20 && i <= 29);
      return perfumes.map((_, i) => i);
    }

    function anterior() {
      if (bloqueado) return;
      const indices = getFilteredIndices();
      const pos = indices.indexOf(indice);
      const nextPos = (pos - 1 + indices.length) % indices.length;
      indice = indices[nextPos];
      mostrarPerfume(indice, -1);
    }

    function siguiente() {
      if (bloqueado) return;
      const indices = getFilteredIndices();
      const pos = indices.indexOf(indice);
      const nextPos = (pos + 1) % indices.length;
      indice = indices[nextPos];
      mostrarPerfume(indice, 1);
    }

    function seleccionarPerfume(i) {
      if (bloqueado || i === indice) {
        indice = i;
        renderMenuNumeros();
        renderDots(indice);
        return;
      }
      const direccion = i > indice ? 1 : -1;
      indice = i;
      mostrarPerfume(indice, direccion);
    }

    function setFiltro(nuevoFiltro) {
      filtroActual = nuevoFiltro;
      document.querySelectorAll(".category-chip").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.filter === nuevoFiltro);
      });

      const disponibles = getFilteredIndices();
      if (!disponibles.includes(indice)) {
        indice = disponibles[0] ?? 0;
      }
      renderMenuNumeros();
      renderDots(indice);
      mostrarPerfume(indice, 1);
    }

    function renderDots(i) {
      dots.innerHTML = "";
      perfumes.forEach((_, idx) => {
        const dot = document.createElement("div");
        dot.className = "dot" + (idx === i ? " active" : "");
        dots.appendChild(dot);
      });
    }

    function renderMenuNumeros() {
      menuNumeros.innerHTML = "";
      const indices = getFilteredIndices();

      indices.forEach((idx) => {
        const btn = document.createElement("button");
        btn.className = "menu-btn" + (idx === indice ? " active" : "");
        btn.textContent = idx + 1;
        btn.title = perfumes[idx].nombre || `Perfume ${idx + 1}`;
        btn.onclick = () => seleccionarPerfume(idx);
        menuNumeros.appendChild(btn);
      });
    }

    function displayText(value, fallback) {
      if (!value || !String(value).trim()) return fallback;
      return value;
    }

    function animateSecondPlane() {
      sideLeft.classList.remove("side-pop-left");
      sideRight.classList.remove("side-pop-right");
      void sideLeft.offsetWidth;
      void sideRight.offsetWidth;
      sideLeft.classList.add("side-pop-left");
      sideRight.classList.add("side-pop-right");
    }

    function mostrarPerfume(i, direccion = 1) {
      bloqueado = true;
      clearTimeout(timerEntrada);

      cinematicFlash.classList.add("show");
      setTimeout(() => cinematicFlash.classList.remove("show"), 180);

      botella.classList.remove(
        "animar-entrada-derecha",
        "animar-salida-izquierda",
        "animar-entrada-izquierda",
        "animar-salida-derecha"
      );

      if (direccion === 1) {
        botella.classList.add("animar-salida-izquierda");
      } else {
        botella.classList.add("animar-salida-derecha");
      }

      timerEntrada = setTimeout(() => {
        const actual = perfumes[i];
        const prev = perfumes[(i - 1 + perfumes.length) % perfumes.length];
        const next = perfumes[(i + 1) % perfumes.length];

        nombrePerfume.textContent = actual.nombre;

        botella.src = actual.imagen;
        sideLeft.src = prev.imagen;
        sideRight.src = next.imagen;

        botella.onerror = () => {
          botella.src = "https://via.placeholder.com/240x360/111111/d8c08a?text=PERFUME";
        };
        sideLeft.onerror = () => {
          sideLeft.src = "https://via.placeholder.com/100x180/111111/d8c08a?text=1";
        };
        sideRight.onerror = () => {
          sideRight.src = "https://via.placeholder.com/100x180/111111/d8c08a?text=2";
        };

        botella.classList.remove("animar-salida-izquierda", "animar-salida-derecha");

        if (direccion === 1) {
          botella.classList.add("animar-entrada-derecha");
        } else {
          botella.classList.add("animar-entrada-izquierda");
        }

        animateSecondPlane();
        renderDots(i);
        renderMenuNumeros();

        setTimeout(() => {
          bloqueado = false;
        }, 520);
      }, 220);
    }

    function verDetalle() {
      const actual = perfumes[indice];

      catalogo.classList.add("hidden");
      detalle.classList.remove("hidden");
      detalle.classList.add("fade-in");
      detalle.classList.add("show");

      detalleImagen.src = actual.imagenDetalle || actual.imagen;
      detalleNombre.textContent = actual.nombre;
      detalleDescripcion.textContent = displayText(actual.descripcion, "Descripción por agregar.");
      precio5ml.textContent = displayText(actual.precio5ml, "Por definir");
      precio3ml.textContent = displayText(actual.precio3ml, "Por definir");

      setTimeout(() => {
        detalle.classList.remove("fade-in");
      }, 800);
    }

    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let particleList = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      createParticles();
    }

    function createParticles() {
      const count = Math.min(100, Math.floor(window.innerWidth / 16));
      particleList = [];
      for (let i = 0; i < count; i++) {
        particleList.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.8 + 0.6,
          vx: (Math.random() - 0.5) * 0.28,
          vy: -0.15 - Math.random() * 0.32,
          alpha: Math.random() * 0.45 + 0.12
        });
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      for (const p of particleList) {
        p.x += p.vx;
        p.y += p.vy;

        if (p.y < -10) {
          p.y = window.innerHeight + 10;
          p.x = Math.random() * window.innerWidth;
        }
        if (p.x < -10) p.x = window.innerWidth + 10;
        if (p.x > window.innerWidth + 10) p.x = -10;

        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 232, 186, ${p.alpha})`;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(animateParticles);
    }

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let glowX = mouseX;
    let glowY = mouseY;
    let dotX = mouseX;
    let dotY = mouseY;

    function animateCursor() {
      glowX += (mouseX - glowX) * 0.08;
      glowY += (mouseY - glowY) * 0.08;
      dotX += (mouseX - dotX) * 0.18;
      dotY += (mouseY - dotY) * 0.18;

      cursorGlow.style.left = glowX + "px";
      cursorGlow.style.top = glowY + "px";
      cursorDot.style.left = dotX + "px";
      cursorDot.style.top = dotY + "px";

      requestAnimationFrame(animateCursor);
    }

    window.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursorGlow.style.opacity = "1";
      cursorDot.style.opacity = "1";
    });

    window.addEventListener("mouseleave", () => {
      cursorGlow.style.opacity = "0";
      cursorDot.style.opacity = "0";
    });

    window.addEventListener("resize", resizeCanvas);

    btnDescubrir.addEventListener("click", irAlCatalogo);
    btnVolverInicio.addEventListener("click", volverAlInicio);
    btnAnterior.addEventListener("click", anterior);
    btnSiguiente.addEventListener("click", siguiente);
    btnExplorar.addEventListener("click", verDetalle);
    btnRegresarCatalogo.addEventListener("click", volverAlCatalogo);
    menuTab.addEventListener("click", toggleMenu);

    categoryRow.addEventListener("click", (e) => {
      const btn = e.target.closest(".category-chip");
      if (!btn) return;
      setFiltro(btn.dataset.filter);
    });

    resizeCanvas();
    animateParticles();
    animateCursor();

    renderMenuNumeros();
    renderDots(indice);
    mostrarPerfume(indice, 1);
  </script>
</body>
